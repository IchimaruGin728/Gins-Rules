name: Build and Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: "28 23 * * *" # 07:28 SGT
    - cron: "16 9 * * *" # 17:16 SGT
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@9.15.4 --activate
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Sync Upstream Rules
        run: go run cmd/sync/main.go

      - name: Commit Synced Rules
        id: sync
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add source/upstream/
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto sync upstream rules [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract GeoIP & ASN
        if: steps.sync.outputs.changed == 'true' || github.event_name != 'schedule'
        run: cargo run --manifest-path infra/aggregator/Cargo.toml --release

      - name: Install Compilers
        if: steps.sync.outputs.changed == 'true' || github.event_name != 'schedule'
        run: |
          # sing-box (for .srs rule-set compilation)
          SINGBOX_VERSION=$(curl -sL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name' | sed 's/v//')
          curl -sL "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-linux-amd64.tar.gz" | tar xz
          sudo mv sing-box-${SINGBOX_VERSION}-linux-amd64/sing-box /usr/local/bin/
          sing-box version

          # mihomo (for .mrs rule-set compilation)
          MIHOMO_VERSION=$(curl -sL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r '.tag_name' | sed 's/v//')
          curl -sL "https://github.com/MetaCubeX/mihomo/releases/download/v${MIHOMO_VERSION}/mihomo-linux-amd64-v${MIHOMO_VERSION}.gz" | gunzip > mihomo
          chmod +x mihomo && sudo mv mihomo /usr/local/bin/

      - name: Compile Rules
        id: compile
        if: steps.sync.outputs.changed == 'true' || github.event_name != 'schedule'
        run: |
          go run cmd/compile/main.go
          cp -r public/* compiled/

          # Collect build stats
          SERVICES=$(find source/proxy source/direct source/reject source/ip -name '*.txt' 2>/dev/null | wc -l | tr -d ' ')
          RULES=$(cat source/proxy/*.txt source/direct/*.txt source/reject/*.txt source/ip/*.txt 2>/dev/null | grep -v '^#' | grep -v '^$' | wc -l | tr -d ' ')
          IP_RULES=$(cat source/ip/*.txt 2>/dev/null | grep -v '^#' | grep -v '^$' | wc -l | tr -d ' ')
          ASN_FILES=$(ls source/ip/asn-*.txt 2>/dev/null | wc -l | tr -d ' ')
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "rules=$RULES" >> $GITHUB_OUTPUT
          echo "ip_rules=$IP_RULES" >> $GITHUB_OUTPUT
          echo "asn_files=$ASN_FILES" >> $GITHUB_OUTPUT

      - name: Build Dashboard
        if: steps.sync.outputs.changed == 'true' || github.event_name != 'schedule'
        run: |
          cd dashboard
          pnpm install
          pnpm build
          cp -r dist/* ../compiled/

      - name: Deploy to Pages
        uses: cloudflare/wrangler-action@v3
        if: steps.sync.outputs.changed == 'true' || github.event_name != 'schedule'
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          workingDirectory: dashboard
          command: pages deploy ../compiled --project-name=gins-rules --branch=main --commit-dirty=true

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        if: steps.sync.outputs.changed == 'true' || github.event_name != 'schedule'
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          workingDirectory: cmd/scanner
          command: deploy src/index.ts --config wrangler.jsonc
          wranglerVersion: latest

      - name: Notify
        if: always() && (steps.sync.outputs.changed == 'true' || github.event_name != 'schedule')
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{
              "services": ${{ steps.compile.outputs.services || 0 }},
              "rules": ${{ steps.compile.outputs.rules || 0 }},
              "formats": 8,
              "ipRules": ${{ steps.compile.outputs.ip_rules || 0 }},
              "asnFiles": ${{ steps.compile.outputs.asn_files || 0 }},
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }' \
            "https://rules.ichimarugin728.dev/workflow/build-complete" || true

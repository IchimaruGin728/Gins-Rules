name: Build and Deploy

on:
  schedule:
    - cron: "28 23 * * *" # 07:28 SGT
    - cron: "16 9 * * *" # 17:16 SGT
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v6
        with:
          node-version: "25.9.0"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies (Root)
        run: pnpm install --no-frozen-lockfile

      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: true

      - name: Tidy Go Modules
        run: |
          go mod tidy
          if [ -f go.sum ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add go.sum
            git commit -m "chore: automated go.sum update" || echo "No changes to commit"
            git push origin main || echo "No changes to push"
          fi
      - name: Fetch Latest Tool Versions
        id: tool-versions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          fetch_releases() {
            local repo="$1"
            local output="$2"

            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -A "Gins-Rules-Workflow" \
              "https://api.github.com/repos/${repo}/releases?per_page=100" \
              -o "$output"

            if ! jq -e 'type == "array"' "$output" >/dev/null; then
              echo "::error::Unexpected GitHub releases payload for ${repo}"
              echo "::group::${repo} raw response"
              cat "$output"
              echo
              echo "::endgroup::"
              exit 1
            fi
          }

          fetch_releases "SagerNet/sing-box" singbox-releases.json
          fetch_releases "MetaCubeX/mihomo" mihomo-releases.json

          # Fetch Absolute Latest sing-box Pre-release
          SINGBOX_URL=$(jq -r '
            map(select(.prerelease == true))
            | .[0].assets[]
            | select(.name | contains("linux-amd64") and endswith(".tar.gz"))
            | .browser_download_url
          ' singbox-releases.json | head -n 1)
          
          # Prefer the latest mihomo alpha for linux-amd64, but fall back to the latest stable build
          # because upstream occasionally publishes alpha assets without any linux-amd64 artifact.
          MIHOMO_URL=$(jq -r '
            (
              [
                .[]
                | select(.tag_name == "Prerelease-Alpha" or .tag_name == "alpha")
                | .assets[]
                | select(.name | test("^mihomo-linux-amd64(-v[123])?(-go[0-9]+)?-alpha-.*\\.gz$"))
                | .browser_download_url
              ] +
              [
                .[]
                | select(.prerelease == false)
                | .assets[]
                | select(.name | test("^mihomo-linux-amd64-v[0-9]+\\.[0-9]+\\.[0-9]+\\.gz$"))
                | .browser_download_url
              ] +
              [
                .[]
                | select(.prerelease == false)
                | .assets[]
                | select((.name | contains("linux-amd64")) and (.name | endswith(".gz")) and (.name | contains("compatible") | not))
                | .browser_download_url
              ]
            )[0] // empty
          ' mihomo-releases.json)

          if [ -z "$SINGBOX_URL" ] || [ -z "$MIHOMO_URL" ]; then
            echo "Resolved tool URLs:"
            echo "  sing-box: ${SINGBOX_URL:-<empty>}"
            echo "  mihomo:   ${MIHOMO_URL:-<empty>}"
            exit 1
          fi

          echo "singbox_url=$SINGBOX_URL" >> $GITHUB_OUTPUT
          echo "mihomo_url=$MIHOMO_URL" >> $GITHUB_OUTPUT
          # Use hash of URLs as cache key
          echo "cache_key=$(echo -n "$SINGBOX_URL-$MIHOMO_URL" | sha256sum | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Cache Binaries
        id: cache-bin
        uses: actions/cache@v5
        with:
          path: bin/
          key: ${{ runner.os }}-binaries-${{ steps.tool-versions.outputs.cache_key }}

      - name: Sync Upstream Rules
        run: |
          go mod tidy
          go run cmd/sync/main.go

      - name: Sync Icon Libraries (Gins-Icons)
        run: |
          go run cmd/icons/main.go

      - name: Sync HE/RIPE BGP + Official CIDR (ASN Prefixes)
        run: go run cmd/he/main.go

      - name: Commit Synced Rules
        id: sync
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add source/
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto sync upstream rules and parsers [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract GeoIP & ASN
        if: steps.sync.outputs.changed == 'true' || github.event_name != 'schedule'
        run: cargo run --manifest-path infra/aggregator/Cargo.toml --release

      - name: Install Compilers (Bleeding Edge Alpha)
        if: (steps.sync.outputs.changed == 'true' || github.event_name != 'schedule') && steps.cache-bin.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p bin
          
          # Fetch Absolute Latest sing-box
          SINGBOX_URL="${{ steps.tool-versions.outputs.singbox_url }}"
          echo "Downloading sing-box from $SINGBOX_URL"
          curl -sL "$SINGBOX_URL" | tar xz --strip-components=1
          mv sing-box bin/
          
          # Fetch Absolute Latest mihomo
          MIHOMO_URL="${{ steps.tool-versions.outputs.mihomo_url }}"
          echo "Downloading mihomo from $MIHOMO_URL"
          if [[ "$MIHOMO_URL" == *.gz ]]; then
            curl -sL "$MIHOMO_URL" | gunzip > bin/mihomo
          elif [[ "$MIHOMO_URL" == *.zip ]]; then
            curl -sL -o mihomo.zip "$MIHOMO_URL"
            unzip -o mihomo.zip
            mv mihomo-linux-amd64* bin/mihomo
          fi
          
          chmod +x bin/sing-box bin/mihomo
          ./bin/sing-box version
          ./bin/mihomo -v

      - name: Compile Rules
        id: compile
        if: steps.sync.outputs.changed == 'true' || github.event_name != 'schedule'
        run: |
          # Fetch the absolute latest commit SHA from Xray-core's main branch
          XRAY_SHA=$(git ls-remote https://github.com/xtls/xray-core.git main | awk '{print $1}')
          echo "Injecting absolute latest Xray-core commit: $XRAY_SHA"
          
          # Dynamically replace the stable baseline with the bleeding-edge commit
          go mod edit -replace github.com/xtls/xray-core=github.com/xtls/xray-core@$XRAY_SHA
          
          go get google.golang.org/protobuf@latest
          go get github.com/maxmind/mmdbwriter@latest
          go mod tidy
          go run ./cmd/compile
          cp -r public/* compiled/

          # Collect build stats
          SERVICES=$(find source/proxy source/direct source/reject source/ip source/upstream -name '*.txt' 2>/dev/null | wc -l | tr -d ' ')
          # Rules count: Domain rules + IP rules
          ALL_TEXT_RULES=$(cat source/proxy/*.txt source/direct/*.txt source/reject/*.txt source/ip/*.txt source/upstream/proxy/*.txt source/upstream/direct/*.txt source/upstream/reject/*.txt source/upstream/ip/*.txt 2>/dev/null | grep -v '^#' | grep -v '^$' | wc -l | tr -d ' ')
          IP_RULES_COUNT=$(cat source/ip/*.txt source/upstream/ip/*.txt 2>/dev/null | grep -v '^#' | grep -v '^$' | wc -l | tr -d ' ')
          ASN_FILES_COUNT=$(ls source/ip/asn-*.txt source/upstream/ip/asn-*.txt 2>/dev/null | wc -l | tr -d ' ')
          
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "rules=$ALL_TEXT_RULES" >> $GITHUB_OUTPUT
          echo "ip_rules=$IP_RULES_COUNT" >> $GITHUB_OUTPUT
          echo "asn_files=$ASN_FILES_COUNT" >> $GITHUB_OUTPUT

      - name: Build Dashboard
        if: steps.sync.outputs.changed == 'true' || github.event_name != 'schedule'
        run: |
          cd dashboard
          pnpm install --no-frozen-lockfile
          pnpm build
          # No longer copying to compiled/ as assets directory in wrangler.jsonc 
          # now points directly to dashboard/dist for stability.

      - name: Sync Rules to R2 (S3 Speed Sync)
        if: steps.sync.outputs.changed == 'true' || github.event_name != 'schedule'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          # Increase concurrency for maximum speed with 1000+ small files
          aws configure set default.s3.max_concurrent_requests 100
          
           # High-speed differential sync
          aws s3 sync compiled/ s3://gins-rules-storage/ \
            --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --delete --no-progress

      - name: Deploy Worker
        if: steps.sync.outputs.changed == 'true' || github.event_name != 'schedule'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Use the already installed wrangler for stable deployment
          npx wrangler deploy --config cmd/scanner/wrangler.jsonc

      - name: Notify
        if: always() && (steps.sync.outputs.changed == 'true' || github.event_name != 'schedule')
        run: |
          # Read categories and metrics from the compiler summary
          SUMMARY=$(cat compiled/ruleset/build-summary.json 2>/dev/null || echo "{}")
          ICONS_HASH=$(cat source/icons-hash.json 2>/dev/null || echo "{}")
          ICONS_TOTAL=$(jq 'length' dashboard/public/icons-catalog.json 2>/dev/null || echo "0")
          
          # Construct the refined JSON payload
          PAYLOAD=$(jq -n \
            --arg project "Gins-Rules" \
            --arg run_id "${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            --arg trigger "${{ github.event_name }}" \
            --argjson stats "$SUMMARY" \
            --argjson icons_hash "$ICONS_HASH" \
            --argjson icons_total "$ICONS_TOTAL" \
            --arg time "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              project: $project,
              build: {
                id: $run_id,
                sha: $sha,
                trigger: $trigger
              },
              metrics: ($stats + {
                icons_total: $icons_total
              }),
              artifacts: {
                icons: $icons_hash
              },
              timestamp: $time
            }')

          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://rules.ichimarugin728.dev/workflow/build-complete" || true

name: Build and Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'pnpm'
          cache-dependency-path: dashboard/pnpm-lock.yaml
      
      - uses: oven-sh/setup-bun@v2
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Sync Upstream Rules
        run: bun run scripts/sync.ts

      - name: Commit Synced Rules
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add source/upstream/
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto sync upstream rules [skip ci]"
            git push
          fi

      - name: Extract GeoIP & ASN
        run: cargo run --manifest-path infra/aggregator/Cargo.toml --release

      - name: Install Compilers
        run: |
          # sing-box (for .srs rule-set compilation)
          SINGBOX_VERSION=$(curl -sL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name' | sed 's/v//')
          curl -sL "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-linux-amd64.tar.gz" | tar xz
          sudo mv sing-box-${SINGBOX_VERSION}-linux-amd64/sing-box /usr/local/bin/
          sing-box version

          # mihomo (for .mrs rule-set compilation)
          MIHOMO_VERSION=$(curl -sL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r '.tag_name' | sed 's/v//')
          curl -sL "https://github.com/MetaCubeX/mihomo/releases/download/v${MIHOMO_VERSION}/mihomo-linux-amd64-v${MIHOMO_VERSION}.gz" | gunzip > mihomo
          chmod +x mihomo && sudo mv mihomo /usr/local/bin/
          mihomo version || true

      - name: Compile Rules
        run: |
          bun run scripts/compile.ts
          cp -r public/* compiled/

      - name: Build Dashboard
        run: |
          cd dashboard
          pnpm install
          pnpm build
          cp -r dist/* ../compiled/

      - name: Deploy to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy compiled --project-name=gins-rules --branch=main --commit-dirty=true
